<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>艾森豪矩陣 | Eisenhower Matrix</title>
  <meta name="description" content="智能任務管理工具 - 用艾森豪矩陣幫你分清輕重緩急">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo-icon">⚡</span>
      <h1 class="logo-text">艾森豪矩陣</h1>
    </div>
    <div class="header-right">
      <div id="localBadge" class="mode-badge hidden">💾 本地模式</div>
      <button id="loginBtn" class="btn-login hidden">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Google 登入
      </button>
      <div id="userInfo" class="user-info hidden">
        <button id="saveBtn" class="btn-save" title="強制存檔">💾 存檔</button>
        <button id="syncBtn" class="btn-sync" title="強制同步">🔄 同步</button>
        <img id="userAvatar" class="avatar" src="" alt="avatar">
        <span id="userName" class="user-name"></span>
        <button id="logoutBtn" class="btn-logout">登出</button>
      </div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="totalTasks">0</span><span class="stat-label">總任務</span></div>
    <div class="stat"><span class="stat-num" id="urgentTasks">0</span><span class="stat-label">緊急</span></div>
    <div class="stat"><span class="stat-num" id="overdueTasks">0</span><span class="stat-label">已逾期</span></div>
    <div class="stat"><span class="stat-num" id="todayTasks">0</span><span class="stat-label">今日到期</span></div>
  </div>

  <!-- Matrix Grid -->
  <main class="matrix-container">
    <!-- Axis Labels -->
    <div class="axis-label axis-top-left">🔥 緊急</div>
    <div class="axis-label axis-top-right">🌿 不緊急</div>
    <div class="axis-label axis-left-top">⭐ 重要</div>
    <div class="axis-label axis-left-bottom">📋 不重要</div>

    <!-- Quadrants -->
    <div class="quadrant q1" id="q1">
      <div class="quadrant-header">
        <div class="q-title">
          <span class="q-dot"></span>
          <h2>立即執行</h2>
        </div>
        <span class="q-subtitle">Do First</span>
        <span class="task-count" id="q1-count">0</span>
      </div>
      <div class="task-list" id="q1-tasks">
        <div class="empty-state">暫無任務 ✨</div>
      </div>
    </div>

    <div class="quadrant q2" id="q2">
      <div class="quadrant-header">
        <div class="q-title">
          <span class="q-dot"></span>
          <h2>計劃安排</h2>
        </div>
        <span class="q-subtitle">Schedule</span>
        <span class="task-count" id="q2-count">0</span>
      </div>
      <div class="task-list" id="q2-tasks">
        <div class="empty-state">暫無任務 📅</div>
      </div>
    </div>

    <div class="quadrant q3" id="q3">
      <div class="quadrant-header">
        <div class="q-title">
          <span class="q-dot"></span>
          <h2>委派處理</h2>
        </div>
        <span class="q-subtitle">Delegate</span>
        <span class="task-count" id="q3-count">0</span>
      </div>
      <div class="task-list" id="q3-tasks">
        <div class="empty-state">暫無任務 🤝</div>
      </div>
    </div>

    <div class="quadrant q4" id="q4">
      <div class="quadrant-header">
        <div class="q-title">
          <span class="q-dot"></span>
          <h2>考慮刪除</h2>
        </div>
        <span class="q-subtitle">Eliminate</span>
        <span class="task-count" id="q4-count">0</span>
      </div>
      <div class="task-list" id="q4-tasks">
        <div class="empty-state">暫無任務 🧹</div>
      </div>
    </div>
  </main>

  <!-- FAB: Add Task -->
  <button id="addTaskBtn" class="fab" aria-label="新增任務">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Add Task Modal -->
  <div id="taskModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2 class="modal-title" id="modalTitle">✏️ 新增任務</h2>
      <form id="taskForm">
        <input type="hidden" id="taskEditId" value="">
        <div class="form-group">
          <label for="taskTitle">任務名稱</label>
          <input type="text" id="taskTitle" placeholder="例如：完成專案報告" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="taskDueDate">截止日期</label>
          <input type="date" id="taskDueDate" required>
        </div>
        <div class="form-group">
          <label>重要性</label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn active" data-important="true" id="importantBtn">⭐ 重要</button>
            <button type="button" class="toggle-btn" data-important="false" id="notImportantBtn">📋 不重要</button>
          </div>
        </div>
        <div class="form-group">
          <label for="taskNotes">任務註明</label>
          <textarea id="taskNotes" placeholder="可以填寫任務細節或描述..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>處理事項 (選填)</label>
          <div class="subtask-input-row">
            <input type="text" id="subtaskTitleInput" placeholder="處理事項名稱" autocomplete="off">
            <input type="date" id="subtaskDateInput">
            <button type="button" id="addSubtaskBtn" class="btn-add-subtask" title="新增子項目">+</button>
          </div>
          <div id="modalSubtasksList" class="modal-subtasks-list"></div>
        </div>
        <div class="form-actions">
          <button type="button" id="cancelTaskBtn" class="btn btn-cancel">取消</button>
          <button type="submit" class="btn btn-submit" id="submitBtn">新增任務</button>
        </div>
      </form>
      <!-- Activity Log (edit mode only) -->
      <div id="logSection" class="log-section hidden">
        <div class="log-header">
          <span class="log-icon">📋</span>
          <span>變更紀錄</span>
        </div>
        <div id="logTimeline" class="log-timeline"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- App Scripts -->
  <script src="js/drive-config.js"></script>
  <script src="js/drive-sync.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/matrix.js"></script>
  <script src="js/app.js"></script>

  <!-- Google APIs (Load these last to avoid race conditions) -->
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
